<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <!-- Cloud Gradient -->
    <linearGradient id="cloud-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <!-- Lightning Gradient -->
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Rounded Base Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  
  <!-- Outer Glow Ring -->
  <rect x="8" y="8" width="496" height="496" rx="120" fill="none" stroke="#22d3ee" stroke-width="12" stroke-opacity="0.4" />

  <g transform="translate(32, 24) scale(0.88)">
    <!-- Cloud Icon Shape -->
    <path d="M 120 320 C 80 320, 50 290, 50 250 C 50 215, 75 185, 110 180 C 125 120, 180 80, 240 80 C 300 80, 350 120, 370 180 C 405 185, 430 215, 430 250 C 430 290, 400 320, 360 320 Z" fill="url(#cloud-grad)" />
    
    <!-- Lightning Bolt -->
    <path d="M 260 220 L 170 370 L 240 370 L 200 480 L 340 330 L 260 330 Z" fill="#f59e0b" filter="url(#glow)" />
    <path d="M 260 220 L 170 370 L 240 370 L 200 480 L 340 330 L 260 330 Z" fill="url(#bolt-grad)" />
  </g>
</svg>
