    api_key: 'YOUR_CLOUDONIX_API_KEY'
});

app.post('/upload', upload.single('image'), async (req, res) => {
    try {
        if (!req.file) {
            return res.status(400).json({ error: 'No file uploaded' });
        }

        // Convert Multer Buffer to File object
        const fileBlob = new Blob([req.file.buffer], { type: req.file.mimetype });
        const file = new File([fileBlob], req.file.originalname, { type: req.file.mimetype });

        const response = await uploader.upload(file);
        
        if (response.success) {
            res.json({ success: true, url: response.data.data.imageUrl });
        } else {
            res.status(500).json({ error: response.error });
        }
    } catch (err) {
        res.status(500).json({ error: err.message });
    }
});

app.listen(3000, () => console.log('Server running on port 3000'));`,

          const originalHTML = btn.innerHTML;

            <span class="text-emerald-400">${getT().copied}</span>

          lucide.createIcons();

        content.innerHTML = html;
        lucide.createIcons();
      }

      // 5. Initializers
      function initializeApp() {
        applyTheme();
        applyLanguage();

        // Router based on Hash
        const hash = window.location.hash.replace("#", "");
        const validPages = [
          "intro",
          "installation",
          "usage",
          "errors",
          "bestPractices",
        ];

        let initialPage = "intro";
        // map dash-separated hash back to camelCase pageIds
        if (hash === "best-practices") {
          initialPage = "bestPractices";
        } else if (validPages.includes(hash)) {
          initialPage = hash;
        }

        setPage(initialPage);
      }

      // Launch
      window.addEventListener("DOMContentLoaded", initializeApp);
      window.addEventListener("hashchange", () => {
        const hash = window.location.hash.replace("#", "");
        const matched = hash === "best-practices" ? "bestPractices" : hash;
        if (
          matched &&
          matched !== state.currentPage &&
          [
            "intro",
            "installation",
            "usage",
            "errors",
            "bestPractices",
          ].includes(matched)
        ) {
          setPage(matched);
        }
      });
    </script>
